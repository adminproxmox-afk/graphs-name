    <!-- Theme flash prevention -->
    <script>
        (function() {
            const THEME_KEY = 'graphly-theme';
            const theme = localStorage.getItem(THEME_KEY) ||
                (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.dataset.theme = theme;
        })();
    </script>

    <style>
        /* Дополнительные общие стили */
        .page-shell {
            min-height: calc(100vh - 200px);
            padding-bottom: 2rem;
        }

        .content-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .btn-primary, .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--color-blue-500);
            color: white;
        }

        .btn-primary:hover {
            background: var(--color-blue-600);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 112, 255, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--color-blue-500);
            border: 2px solid var(--color-blue-500);
        }

        .btn-secondary:hover {
            background: var(--color-blue-100);
            transform: translateY(-2px);
        }

        /* Стили для контента материалов */
        .material-content {
            background: white;
            border-radius: 16px;
            padding: 3rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            margin: 2rem 0;
        }

        .material-title {
            font-size: 2.5rem;
            color: var(--color-black-300);
            margin-bottom: 1.5rem;
            border-bottom: 3px solid var(--color-blue-500);
            padding-bottom: 1rem;
        }

        .material-subtitle {
            font-size: 1.5rem;
            color: var(--color-black-200);
            margin: 2rem 0 1rem;
        }

        .material-text {
            line-height: 1.8;
            color: var(--color-black-100);
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .material-list {
            list-style: none;
            padding-left: 1.5rem;
            margin: 1.5rem 0;
        }

        .material-list li {
            margin-bottom: 0.75rem;
            color: var(--color-black-100);
            position: relative;
            line-height: 1.6;
        }

        .material-list li:before {
            content: "•";
            color: var(--color-blue-500);
            position: absolute;
            left: -1rem;
            font-size: 1.5rem;
        }

        .material-task {
            background: var(--color-white-200);
            border-left: 4px solid var(--color-blue-500);
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 0 8px 8px 0;
        }

        .material-task h4 {
            color: var(--color-blue-500);
            margin-bottom: 0.5rem;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--color-blue-500);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2rem;
            transition: color 0.3s;
        }

        .back-button:hover {
            color: var(--color-blue-600);
        }

        @media (max-width: 768px) {
            .material-content {
                padding: 1.5rem;
            }

            .material-title {
                font-size: 2rem;
            }

            .content-section {
                padding: 0 1rem;
            }
        }
    </style>
</head>
